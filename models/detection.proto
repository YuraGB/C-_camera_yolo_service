syntax = "proto3";

package detection;

import "google/protobuf/empty.proto";

// ---------------------
// Об’єкт, який описує bounding box
// ---------------------
message BBox {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

// ---------------------
// Одиночне виявлення
// ---------------------
message Detection {
  string label = 1;      // наприклад "person", "car"
  float confidence = 2;  // ймовірність
  BBox bbox = 3;         // координати
}

// ---------------------
// Кадр з детекціями
// ---------------------
message Frame {
  string camera_id = 5;
  int32 frame_id = 1;
  int64 timestamp = 2;         // час кадру у мс
  bytes image = 3;             // JPEG-кадр у вигляді байтів
  repeated Detection detections = 4;
}

// ---------------------
// gRPC сервіс
// ---------------------
service DetectionService {
  // ✅ ТІЛЬКИ читання стріму (те що тобі зараз треба)
  rpc StreamDetections (google.protobuf.Empty) returns (stream Frame);
}