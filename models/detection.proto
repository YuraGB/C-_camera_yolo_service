syntax = "proto3";

package detection;

import "google/protobuf/empty.proto";

message BBox {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

message Detection {
  string label = 1;
  float confidence = 2;
  BBox bbox = 3;
}

message Frame {
  int64 frame_id = 1;
  int64 timestamp = 2;
  bytes image = 3;
  repeated Detection detections = 4;
  string camera_id = 5;
}

service DetectionService {
  rpc StreamLiveFrames(google.protobuf.Empty) returns (stream Frame);
  rpc StreamDetectionFrames(google.protobuf.Empty) returns (stream Frame);
}
